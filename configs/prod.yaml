# 生产环境配置（APP_ENV=prod 时加载）
# 注意：DB / JWT / LLM 等敏感密钥务必只经环境变量或 K8s Secret 注入，绝不写入此文件
app:
  name: arch-fastapi
  env: prod
  host: 0.0.0.0
  port: 8005
  debug: false  # 生产环境必须关闭调试
  log_level: WARNING  # 生产用 WARNING，减少日志量
  # uvicorn 运行期调优（生产）
  workers: 4  # worker 进程数；建议 ≈ CPU 核数或略高
  loop: auto  # auto=优先 uvloop（部署机 pip install uvloop 后自动启用）
  limit_concurrency: 2000  # 最大并发连接，背压保护
  timeout_keep_alive: 10  # keep-alive 秒数
  access_log: true  # 保留访问日志（接 loguru）；若有外层网关记 access log 可设 false

logging:
  level: WARNING
  dir: logs
  rotation: "00:00"   # 按天轮转：每天 0 点分割，文件名带日期便于归档
  retention: 30 days
  compression: zip
  diagnose: false   # prod 关：防异常栈泄露敏感变量
  backtrace: true
  enqueue: true

db:
  url: postgresql+asyncpg://user:pass@localhost:5432/claude-sdk  # 占位 DSN（真值走环境变量 APP__DB__URL）
  pool_size: 20  # prod 增大连接池
  max_overflow: 40
  pool_recycle: 3600
  echo: false   # prod 关 SQL echo

redis:
  url: redis://localhost:6379/0  # Redis 连接 URL（生产环境建议走环境变量 APP__REDIS__URL）
  db: 0  # 数据库编号（url 路径优先，未指定时用本值）
  max_connections: 50  # 连接池最大连接数（生产可适当放大）
  decode_responses: true  # 自动解码响应为 str
  encoding: utf-8  # 字符编码

milvus:
  enabled: true  # 可经 MILVUS__ENABLED 关闭；不可达时服务降级运行
  uri: http://milvus:19530  # 生产地址建议经 MILVUS__URI 覆盖
  db_name: default  # 可经 MILVUS__DB_NAME 覆盖
  timeout: 10.0
  batch_size: 1000
  # token 敏感，绝不写 yaml；通过 MILVUS__TOKEN / K8s Secret 注入

cors:
  # 生产收敛为白名单（安全合规）。allow_origins 真值走环境变量注入：
  # APP__CORS__ALLOW_ORIGINS（JSON 数组格式，如 ["https://app.example.com"]）
  allow_origins:
    - https://example.com  # 占位域名，上线前替换为真实前端域名
  allow_methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]  # REST 全集
  allow_headers: [Authorization, Content-Type, X-Request-Id]  # 含 RequestID 入站头
  allow_credentials: false  # JWT 走 Authorization 头，无 cookie 凭证；若改 true 须确保 origins 无通配
  expose_headers: [X-Request-Id]  # 允许前端读取响应里的 request_id（追踪链闭环）
  max_age: 600  # 预检缓存秒数

skills:
  enabled: true  # skill 注册中心总开关；false 时空运行
  base_dir: app/skills  # skill 内容根目录（相对项目根；生产可经 SKILLS__BASE_DIR 挂载覆盖）
  cache_loaded: true  # 是否缓存懒加载的 SkillBundle

projects:
  # 生产必须经 PROJECTS__ALLOWED_ROOTS 覆盖为真实受控目录，禁止放开到系统根目录。
  allowed_roots:
    - /workspace
  workspace_root: /workspace/.runtime/project-workspaces
  max_scan_files: 2000
  max_sample_files: 20
  command_timeout: 300

claude_agent:
  enabled: true
  permission_mode: bypassPermissions
  include_partial_messages: true
  command_timeout: 300
  startup_timeout: 15
  default_cwd: /workspace
  use_local_agent_relay: true
  local_agent_task_timeout: 120
  strict_mcp_config: false
  mcp_servers: {}

mcp:
  client:
    enabled: true
    default_server: demo
    connect_timeout: 5.0
    call_timeout: 30.0
    max_concurrency: 100
    servers:
      demo:
        enabled: true
        url: https://mcp.example.com/mcp
  server:
    enabled: false  # 当前版本无认证能力，生产默认禁止启动匿名 MCP Server
    name: arch-fastapi-mcp
    host: 127.0.0.1
    port: 8010
    path: /mcp
    stateless_http: true
    json_response: true

llm:
  default_provider: openai  # 默认 Provider（get_provider 未指定名字时回退）
  # Provider 统一走 OpenAI 兼容端点，靠 base_url + api_key 切换厂商。
  # api_key 敏感，**绝不写入本文件**，生产经环境变量 / K8s Secret 注入：
  # LLM_API_KEY_<大写NAME>（如 LLM_API_KEY_OPENAI），由 core/llm/gateway.py 读取。
  # timeout / max_retries 未写则用代码默认（60s / 2 次），如需调优在此显式覆盖。
  providers:
    openai:
      base_url: https://api.openai.com/v1
      default_model: gpt-4o-mini
      embedding_model: text-embedding-3-small
      multimodal_model: gpt-4o-mini
    deepseek:
      base_url: https://api.deepseek.com/v1
      default_model: deepseek-chat
    qwen:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      default_model: qwen-plus
    claude:
      base_url: https://api.anthropic.com/v1
      default_model: claude-3-5-sonnet-20241022
    zhipu:
      base_url: https://open.bigmodel.cn/api/paas/v4/
      default_model: glm-4-flash
  # LangSmith 追踪开关（默认关闭=零上报）；生产启用时密钥经环境变量/K8s Secret 注入 LANGCHAIN_API_KEY
  langsmith:
    enabled: false
    project: default
