# 开发环境配置（APP_ENV=dev 时加载）
# 优先级：环境变量 > .env > 本文件 > 代码默认值
app:
  name: arch-fastapi  # 应用名称
  env: dev  # 环境标识，须与文件名一致
  host: 0.0.0.0  # 监听地址
  port: 8003  # 监听端口
  debug: true  # 开发环境开启调试
  log_level: DEBUG  # 开发环境用 DEBUG 级别日志，便于排查

logging:
  level: DEBUG
  dir: logs
  rotation: "00:00"   # 按天轮转：每天 0 点分割，文件名带日期便于归档
  retention: 30 days
  compression: zip
  diagnose: true   # dev 开：异常栈展开变量，便于排查
  backtrace: true
  enqueue: true

db:
  url: postgresql+asyncpg://root:root@127.0.0.1:5432/claude-sdk  # 本地开发 PostgreSQL（root/root，已建 arch_fastapi 库；生产改环境变量 DB__URL 覆盖）
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600
  echo: true   # dev 开 SQL echo，便于排查

redis:
  url: redis://localhost:6379/0  # Redis 连接 URL
  db: 0  # 数据库编号（url 路径优先，未指定时用本值）
  max_connections: 20  # 连接池最大连接数
  decode_responses: true  # 自动解码响应为 str
  encoding: utf-8  # 字符编码

milvus:
  enabled: true  # 开发环境启用；不可达时自动降级，不阻断应用启动
  uri: http://localhost:19530  # 本地 Milvus 地址
  db_name: default  # 目标数据库
  timeout: 10.0  # SDK 操作超时秒数
  batch_size: 256  # insert/upsert 单批实体数
  # token 敏感，不写 yaml；通过 MILVUS__TOKEN 环境变量注入

cors:
  allow_origins: ["*"]  # dev 全放行，开发友好
  allow_methods: ["*"]  # 全方法
  allow_headers: ["*"]  # 全请求头
  allow_credentials: false  # origins 通配时必须 False（浏览器拒绝 ["*"]+True 非法组合）
  expose_headers: []  # 暴露给前端的响应头
  max_age: 600  # 预检缓存秒数

skills:
  enabled: true  # skill 注册中心总开关；false 时空运行
  base_dir: app/skills  # skill 内容根目录（相对项目根）
  cache_loaded: true  # 是否缓存懒加载的 SkillBundle

projects:
  allowed_roots:
    - /Users/zhili.deng/dzl-py
    - /Users/zhili.deng/codex
  workspace_root: .runtime/project-workspaces
  max_scan_files: 2000
  max_sample_files: 20
  command_timeout: 300

claude_agent:
  enabled: true
  permission_mode: bypassPermissions
  include_partial_messages: true
  command_timeout: 300
  startup_timeout: 15
  default_cwd: /Users/zhili.deng/dzl-py/claude-sdk
  use_local_agent_relay: true
  local_agent_task_timeout: 120
  strict_mcp_config: false
  mcp_servers: {}

mcp:
  client:
    enabled: true
    default_server: demo
    connect_timeout: 5.0
    call_timeout: 30.0
    max_concurrency: 20
    servers:
      demo:
        enabled: true
        url: http://127.0.0.1:8010/mcp
  server:
    enabled: true
    name: arch-fastapi-mcp
    host: 127.0.0.1
    port: 8010
    path: /mcp
    stateless_http: true
    json_response: true

llm:
  default_provider: openai  # 默认 Provider（get_provider 未指定名字时回退）
  # Provider 统一走 OpenAI 兼容端点，靠 base_url + api_key 切换厂商。
  # api_key 敏感，**不写本文件**，经环境变量 LLM_API_KEY_<大写NAME> 注入
  # （如 LLM_API_KEY_OPENAI），由 core/llm/gateway.py 读取。
  providers:
    openai:
      base_url: https://api.openai.com/v1
      default_model: gpt-4o-mini
      embedding_model: text-embedding-3-small
      multimodal_model: gpt-4o-mini
    deepseek:
      base_url: https://api.deepseek.com/v1
      default_model: deepseek-chat
    qwen:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 通义 DashScope OpenAI 兼容模式
      default_model: qwen-plus
    claude:
      base_url: https://api.anthropic.com/v1  # Anthropic 官方 OpenAI 兼容端点
      default_model: claude-3-5-sonnet-20241022
    zhipu:
      base_url: https://open.bigmodel.cn/api/paas/v4/  # 智谱 OpenAI 兼容模式
      default_model: glm-4-flash
  # LangSmith 追踪开关（默认关闭=零上报）；启用时密钥经环境变量 LANGCHAIN_API_KEY 注入
  langsmith:
    enabled: false
    project: default
